<h1>Palpites</h1>

<div id="palpites"></div>

<script>
fetch('data/palpites.csv')
  .then(response => response.text())
  .then(text => {

    const linhas = text.trim().split('\n');

    const cabecalho = linhas[0].split(';');

    const data = cabecalho[0];

    const jogos = [];

    for (let i = 1; i < cabecalho.length; i++) {

      if (cabecalho[i].trim() !== '') {
        jogos.push({
          nome: cabecalho[i],
          coluna: i
        });
      }
    }

    let html = `
      <h2 style="text-align:center;">
        📅 Palpites do dia - ${data}
      </h2>

      <table id="tabela-palpites">
        <tr>
          <th>Jogador</th>
    `;

    jogos.forEach(jogo => {
      html += `<th>${jogo.nome}</th>`;
    });

    html += '</tr>';

    for (let i = 2; i < linhas.length; i++) {

      const c = linhas[i].split(';');

  if (!c[0].trim() || c[0].trim() === '0') continue;

      html += `<tr>`;

      html += `<td><strong>${c[0]}</strong></td>`;

   jogos.forEach(jogo => {

  const gol1 = c[jogo.coluna] || '';
  const x = c[jogo.coluna + 1] || 'x';
  const gol2 = c[jogo.coluna + 2] || '';

  html += `
    <td>
      ${gol1} ${x} ${gol2}
    </td>
  `;
});

      html += `</tr>`;
    }

    html += '</table>';

    document.getElementById('palpites').innerHTML = html;

  });
</script>
