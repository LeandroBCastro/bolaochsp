<h1>Ranking</h1>

<table id="tabela"></table>

<script>
fetch('data/palpites.csv')
  .then(response => response.text())
  .then(text => {
    const linhas = text.trim().split('\n');
    let html = '';

    linhas.forEach((linha, i) => {
      const colunas = linha.split(';');

      html += '<tr>';

      colunas.forEach(col => {
        if (i === 1) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col}</td>`;
        }
      });

      html += '</tr>';
    });

    document.getElementById('tabela').innerHTML = html;
  });
</script>

</body>
</html>
