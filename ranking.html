<script>
fetch('data/ranking.csv')
  .then(response => response.text())
  .then(text => {

    const linhas = text.trim().split('\n');

    let html = '';

    // Cabeçalho
    const cabecalho = linhas[1].split(';');

    html += '<tr>';

    cabecalho.forEach(col => {
      if (col.trim() !== '') {
        html += `<th>${col}</th>`;
      }
    });

    html += '</tr>';

    const ranking = [];

    // Jogadores
    for (let i = 2; i < linhas.length; i++) {

      const colunas = linhas[i].split(';');

      if (colunas.length < 2) continue;

      const pontos = parseInt(colunas[1]) || 0;

      // Ignora quem tem 0 pontos
      if (pontos === 0) continue;

      ranking.push({
        nome: colunas[0].trim(),
        pontos: pontos
      });

      html += '<tr>';

      colunas.forEach(col => {
        if (col.trim() !== '') {
          html += `<td>${col}</td>`;
        }
      });

      html += '</tr>';
    }

    document.getElementById('tabela').innerHTML = html;

    // Ordena o pódio
    ranking.sort((a, b) => b.pontos - a.pontos);

    // Mostra pódio somente se houver pelo menos 3 jogadores
    if (ranking.length >= 3) {

      document.getElementById('podio').innerHTML = `
        <div class="podio">

          <div class="segundo">
            🥈<br>
            ${ranking[1].nome}<br>
            ${ranking[1].pontos} pts
          </div>

          <div class="primeiro">
            🥇<br>
            ${ranking[0].nome}<br>
            ${ranking[0].pontos} pts
          </div>

          <div class="terceiro">
            🥉<br>
            ${ranking[2].nome}<br>
            ${ranking[2].pontos} pts
          </div>

        </div>
      `;
    }

  });
</script>
