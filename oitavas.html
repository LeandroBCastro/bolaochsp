<!DOCTYPE html>
<html lang="pt-br">

<body>

<nav>

<h1>🏆 Oitavas de Final</h1>

<div id="chaveamento" class="chaveamento"></div>

<script>
fetch('data/oitavas.csv')
  .then(response => response.text())
  .then(text => {

    const linhas = text.trim().split('\n');

    let html = '';

    linhas.forEach((linha, i) => {

      if (i < 2) return;

      const c = linha.split(';');

      if (c.length < 9) return;

      if (
        c[0].trim() === '' &&
        c[2].trim() === '' &&
        c[8].trim() === ''
      ) return;

      const data = c[0].trim();
      const hora = c[1].trim();
      const time1 = c[2].trim();
      const gols1 = c[4].trim();
      const gols2 = c[6].trim();
      const time2 = c[8].trim();

      let placar = 'x';

      if (gols1 !== '' && gols2 !== '') {
        placar = `${gols1} x ${gols2}`;
      }

      html += `
        <div class="partida">

          <div class="partida-info">
            📅 ${data} • 🕓 ${hora}
          </div>

          <div class="time">
            <span>${time1}</span>
            <strong>${gols1}</strong>
          </div>

          <div class="time">
            <span>${time2}</span>
            <strong>${gols2}</strong>
          </div>

          <div class="placar-central">
            ${placar}
          </div>

        </div>
      `;
    });

    document.getElementById('chaveamento').innerHTML = html;

  });
</script>

</body>
</html>
