<h1>⚽ Artilharia da Copa</h1>

<div class="artilheiro-atual">
  🥇 <strong>Lionel Messi (Argentina)</strong>
  <br>
  3 gols
</div>

<h2>🏆 Palpites dos Participantes</h2>

<table id="tabela-artilharia"></table>

<script>
fetch('data/artilharia.csv')
  .then(response => response.text())
  .then(text => {

    const linhas = text.trim().split('\n');

    let html = '';

    linhas.forEach((linha, i) => {

      const colunas = linha.split(';');

      html += '<tr>';

      colunas.forEach(col => {

        if (i === 0) {
          html += `<th>${col}</th>`;
        } else {
          html += `<td>${col.trim()}</td>`;
        }

      });

      html += '</tr>';
    });

    document.getElementById('tabela-artilharia').innerHTML = html;

  });
</script>
