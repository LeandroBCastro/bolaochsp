<h1>1ª Rodada</h1>

<div id="jogos"></div>

  <script>
fetch('data/rodada1.csv')
  .then(response => response.text())
  .then(text => {

    const linhas = text.trim().split('\n');

    let html = '';

    linhas.forEach((linha, i) => {

      if (i < 2) return;

      const c = linha.split(';');
      
      if (c.length < 9) return;

if (
  c[0].trim() === '' &&
  c[2].trim() === '' &&
  c[8].trim() === ''
) return;

      const data = c[0];
      const hora = c[1];
      const time1 = c[2];
      const gols1 = c[4];
      const gols2 = c[6];
      const time2 = c[8];
      const numeroJogo = i - 1;

      let placar = 'x';

      if (gols1 !== '' && gols2 !== '') {
        placar = `${gols1} x ${gols2}`;
      }

      html += `
        <div class="jogo-card">

          <div class="jogo-info">
⚽ Jogo ${numeroJogo} • 📅 ${data} • 🕓 ${hora}
          </div>

          <div class="jogo-times">

            <span class="time-casa">
              ${time1}
            </span>

            <span class="placar">
              ${placar}
            </span>

            <span class="time-fora">
              ${time2}
            </span>

          </div>

        </div>
      `;
    });

    document.getElementById('jogos').innerHTML = html;
  });
</script>

</body>
</html>
