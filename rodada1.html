<h1>1ª Rodada</h1>

<div id="jogos"></div>

<script>
fetch('data/rodada1.csv')
  .then(response => response.text())
  .then(text => {

    const linhas = text.trim().split('\n');

    let html = '';

    linhas.forEach((linha, i) => {

      if (i === 0) return;

      const colunas = linha.split(';');

      html += `
        <div class="jogo-card">

          <div class="jogo-info">
            📅 ${colunas[0]} &nbsp;&nbsp; 🕓 ${colunas[1]}
          </div>

          <div class="jogo-times">
            <span>${colunas[2]}</span>

            <span class="versus">⚽</span>

            <span>${colunas[6]}</span>
          </div>

        </div>
      `;
    });

    document.getElementById('jogos').innerHTML = html;
  });
</script>

</body>
</html>
