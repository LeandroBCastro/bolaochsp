<h1>1ª Rodada</h1>

<div id="jogos"></div>

<script>
fetch('data/rodada1.csv')
  .then(response => response.text())
  .then(text => {

    const linhas = text.trim().split('\n');
    let html = '';

    linhas.forEach((linha, i) => {

      if (i === 0) return;

      const c = linha.split(';');

      const data = c[0];
      const hora = c[1];
      const mandante = c[2];
      const gm = c[3];
      const gv = c[4];
      const visitante = c[5];

      const placar =
        gm !== '' && gv !== ''
          ? `${gm} x ${gv}`
          : 'x';

      html += `
        <div class="jogo-card">

          <div class="jogo-info">
            📅 ${data} • 🕓 ${hora}
          </div>

          <div class="jogo-times">
            <span>${mandante}</span>

            <span class="placar">
              ${placar}
            </span>

            <span>${visitante}</span>
          </div>

        </div>
      `;
    });

    document.getElementById('jogos').innerHTML = html;
  });
</script>

</body>
</html>
