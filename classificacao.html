<h1>Classificação dos Grupos</h1>

<div id="classificacao"></div>

<script>
fetch('data/classificacao.csv')
  .then(response => response.text())
  .then(text => {

    const linhas = text.trim().split('\n');

    let html = '';
    let grupoAberto = false;

    linhas.forEach(linha => {

      const colunas = linha.split(';');

      // Início de um grupo
      if (colunas[1] && colunas[1].includes('GRUPO')) {

        if (grupoAberto) {
          html += `
              </tbody>
            </table>
          </div>
          `;
        }

        html += `
          <div class="grupo-card">
            <div class="grupo-titulo">${colunas[1]}</div>

            <table class="grupo-tabela">
              <thead>
                <tr>
                  <th>Pos</th>
                  <th>Seleção</th>
                  <th>P</th>
                  <th>J</th>
                  <th>V</th>
                  <th>E</th>
                  <th>D</th>
                  <th>SG</th>
                  <th>GP</th>
                  <th>GC</th>
                </tr>
              </thead>
              <tbody>
        `;

        grupoAberto = true;
      }

      // Linhas das seleções
      else if (colunas[0] && colunas[0].includes('º')) {

        html += `
          <tr>
            <td>${colunas[0]}</td>
            <td>${colunas[1]}</td>
            <td>${colunas[2]}</td>
            <td>${colunas[3]}</td>
            <td>${colunas[4]}</td>
            <td>${colunas[5]}</td>
            <td>${colunas[6]}</td>
            <td>${colunas[7]}</td>
            <td>${colunas[8]}</td>
            <td>${colunas[9]}</td>
          </tr>
        `;
      }

    });

    html += `
          </tbody>
        </table>
      </div>
    `;

    document.getElementById('classificacao').innerHTML = html;
  });
</script>

</body>
</html>
