<h1>Classificação dos Grupos</h1>

<table id="tabela"></table>

<script>
fetch('data/classificacao.csv')
  .then(response => response.text())
  .then(text => {

    const linhas = text.trim().split('\n');

    let html = '<div class="grupos">';

    let grupoAberto = false;

    linhas.forEach(linha => {

      const colunas = linha.split(';');

      if (colunas[1] && colunas[1].includes('GRUPO')) {

        if (grupoAberto) {
          html += `
              </tbody>
            </table>
          </div>
          `;
        }

        html += `
          <div class="grupo-card">
            <h2>${colunas[1]}</h2>

            <table class="grupo-tabela">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Seleção</th>
                  <th>P</th>
                </tr>
              </thead>
              <tbody>
        `;

        grupoAberto = true;

      } else if (
        colunas[0] &&
        colunas[0].includes('º')
      ) {

        html += `
          <tr>
            <td>${colunas[0]}</td>
            <td>${colunas[1]}</td>
            <td>${colunas[2]}</td>
          </tr>
        `;
      }

    });

    html += `
          </tbody>
        </table>
      </div>
    </div>
    `;

    document.getElementById('tabela').innerHTML = html;

  });
</script>

</body>
</html>
