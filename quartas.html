<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Quartas de Final</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html">Início</a>
  <a href="ranking.html">Ranking</a>
  <a href="classificacao.html">Classificação</a>
  <a href="palpites.html">Palpites</a>

  <a href="rodada2.html">2ª Rodada</a>
  <a href="oitavas.html">Oitavas</a>
  <a href="quartas.html">Quartas</a>
</nav>

<h1>🏆 Quartas de Final</h1>

<div class="chaveamento">

  <div id="lado-esquerdo" class="lado"></div>

  <div id="lado-direito" class="lado"></div>

</div>

<script>
fetch('data/quartas.csv')
  .then(response => response.text())
  .then(text => {

    const linhas = text.trim().split('\n');

    let esquerda = '';
    let direita = '';

    let contador = 0;

    linhas.forEach((linha, i) => {

      if (i < 2) return;

      const c = linha.split(';');

      if (c.length < 9) return;

      if (
        c[0].trim() === '' &&
        c[2].trim() === '' &&
        c[8].trim() === ''
      ) return;

      contador++;

      const data = c[0].trim();
      const hora = c[1].trim();

      const time1 = c[2].trim();
      const gols1 = c[4].trim();

      const gols2 = c[6].trim();
      const time2 = c[8].trim();

      let placar1 = gols1 || '-';
      let placar2 = gols2 || '-';

      const jogoHTML = `

        <div class="partida-chave">

          <div class="partida-info">
            ⚽ Jogo ${contador} • 📅 ${data} • 🕓 ${hora}
          </div>

          <div class="linha-time">
            <span>${time1}</span>
            <strong>${placar1}</strong>
          </div>

          <div class="linha-time">
            <span>${time2}</span>
            <strong>${placar2}</strong>
          </div>

        </div>
      `;

      if (contador <= 2) {
        esquerda += jogoHTML;
      } else if (contador <= 4) {
        direita += jogoHTML;
      }

    });

    document.getElementById('lado-esquerdo').innerHTML = esquerda;
    document.getElementById('lado-direito').innerHTML = direita;

  });
</script>

</body>
</html>
